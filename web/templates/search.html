{{define "title"}}搜索: {{.Query}}{{end}}

{{define "content"}}
<h1>搜索: {{.Query}}</h1>
{{if .Results}}
<ul class="item-list">
    {{range .Results}}
    <li>
        <a href="{{.Link}}" class="item-link">
            <span class="badge">{{.Kind}}</span>
            {{.Title}}
        </a>
        <span class="meta">{{.Meta}}</span>
    </li>
    {{end}}
</ul>
{{else}}
<p class="empty">没有找到匹配的结果。</p>
{{end}}
{{end}}
