<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{block "title" .}}Go 学习助手{{end}}</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
    <script>mermaid.initialize({startOnLoad: true, theme: 'dark'});</script>
</head>
<body>
    <nav>
        <div class="nav-inner">
            <a href="/" class="brand">Go 学习助手</a>
            <div class="nav-links">
                <a href="/knowledge/">知识点</a>
                <a href="/concepts/">概念问答</a>
                <a href="/exercises/">编码题</a>
                <a href="/wrong-book/">错题本</a>
            </div>
            <form class="search-form" action="/search" method="get">
                <input type="text" name="q" placeholder="搜索..." value="{{.Query}}">
            </form>
        </div>
    </nav>

    <main>
        {{block "content" .}}{{end}}
    </main>
</body>
</html>
